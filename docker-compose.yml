services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: skillomat
      MYSQL_USER: skillomat
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: skillomat
      DB_USERNAME: skillomat
      DB_PASSWORD: secret
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ./web
    environment:
      VITE_API_PROXY: http://backend:80
      # Published on 5174 to avoid colliding with other local dev servers on 5173.
      VITE_HMR_CLIENT_PORT: "5174"
    ports:
      - "5174:5173"
    depends_on:
      - backend

volumes:
  mysql-data:
