# Production stack for the single EC2 host (MOB-3).
#
# Differences from the local docker-compose.yml:
#   - No published MySQL port; the DB is reachable only inside the compose network.
#   - Secrets/config come from the host .env (/opt/skillomat/.env, mode 600) via
#     variable substitution — nothing sensitive is committed or baked into git.
#   - restart: unless-stopped so the box self-heals after a reboot.
#   - APP_ENV=production / APP_DEBUG=false; APP_KEY is supplied (never regenerated).
#
# Deploy:  docker compose -f docker-compose.prod.yml up -d --build
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-skillomat}
      MYSQL_USER: ${DB_USERNAME:-skillomat}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in the host .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in the host .env}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    image: skillomat-backend:local
    environment:
      APP_NAME: Skillomat
      APP_ENV: production
      APP_DEBUG: "false"
      # Generated once during setup and pinned in the host .env. Regenerating it
      # would invalidate encrypted cookies and password-reset tokens.
      APP_KEY: ${APP_KEY:?set APP_KEY in the host env file, see backend/.env.production.example}
      # The public CloudFront URL. Used for email links and the Google OAuth return.
      APP_URL: ${APP_URL:?set APP_URL to the CloudFront URL}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:?set APP_FRONTEND_URL to the CloudFront URL}
      LOG_CHANNEL: stack
      LOG_LEVEL: warning
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-skillomat}
      DB_USERNAME: ${DB_USERNAME:-skillomat}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in the host .env}
      # Transactional email (MOB-7). Defaults to 'log' so a host that hasn't set up
      # SES still boots; set MAIL_MAILER=ses in the host .env to actually deliver.
      # See documentation/kb/OPERATIONS.md → "Email (SES)" for the one-time setup.
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Skillomat}
      # SES region. The AWS keys are left empty by default so the SDK falls back to
      # the EC2 instance role (no stored mail secret); populate them only on the
      # static-IAM-user fallback path.
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-central-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # Google OAuth (MOB-13). Left empty by default so a host that hasn't set up
      # a Google OAuth client still boots with Google sign-in disabled (see
      # backend/config/services.php). GOOGLE_REDIRECT_URI must exactly match the
      # redirect URI registered for the client in Google Cloud Console.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
    ports:
      # CloudFront's EC2 origin talks HTTP to host :80; nothing else can reach it
      # (security group allows :80 only from the CloudFront prefix list).
      - "80:80"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
